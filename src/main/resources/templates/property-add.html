<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Property</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container mt-5">
    <h1>Add Property</h1>

    <p th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-danger"></p>

    <form action="/properties/add" method="post">

        <!-- Property Type Selection -->
        <div class="mb-3">
            <label class="form-label">Property Type</label>

            <select name="propertyType" id="propertyType"
                    class="form-control"
                    onchange="toggleFields()">

                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
                <option value="Land">Land</option>

            </select>
        </div>

        <!-- Property ID -->
        <div class="mb-3">
            <label class="form-label">Property ID</label>
            <input type="text" name="propertyId" class="form-control" required>
        </div>

        <!-- Title -->
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control" required>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="number" name="price" class="form-control" required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" required></textarea>
        </div>

        <!-- HOUSE FIELDS -->
        <div id="houseFields">

            <div class="mb-3">
                <label class="form-label">Bedrooms</label>
                <input type="number" name="bedrooms" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Bathrooms</label>
                <input type="number" name="bathrooms" class="form-control">
            </div>

        </div>

        <!-- APARTMENT FIELDS -->
        <div id="apartmentFields" style="display:none;">

            <div class="mb-3">
                <label class="form-label">Floor Number</label>
                <input type="number" name="floorNumber" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Unit Number</label>
                <input type="text" name="unitNumber" class="form-control">
            </div>

        </div>

        <!-- LAND FIELDS -->
        <div id="landFields" style="display:none;">

            <div class="mb-3">
                <label class="form-label">Land Size</label>
                <input type="number" step="0.01" name="landSize" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Land Type</label>
                <input type="text" name="landType" class="form-control">
            </div>

        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-success">
            Save Property
        </button>

        <a href="/properties" class="btn btn-secondary">
            Back
        </a>

    </form>
</div>

<script src="/js/property.js"></script>

</body>
</html>
