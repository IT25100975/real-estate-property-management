<!DOCTYPE html>

<!-- Thymeleaf HTML page for displaying all properties -->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Property Listings</title>

    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS file -->
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Main page container -->
<div class="container mt-5">

    <!-- Page heading -->
    <h1 class="mb-4">Property Listings</h1>

    <!-- Button to open Add Property page -->
    <a href="/properties/add" class="btn btn-primary mb-3">Add Property</a>

    <!-- Button to open Search Property page -->
    <a href="/properties/search" class="btn btn-secondary mb-3">Search Properties</a>

    <!-- Property table -->
    <table class="table table-bordered">

        <!-- Table header -->
        <thead>
        <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Title</th>
            <th>Location</th>
            <th>Price</th>
            <th>Description</th>
            <th>Detail 1</th>
            <th>Detail 2</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <!-- Loop through all properties received from controller -->
        <tr th:each="property : ${properties}">
            <td th:text="${property.propertyId}"></td>
            <td th:text="${property.propertyType}"></td>
            <td th:text="${property.title}"></td>
            <td th:text="${property.location}"></td>
            <td th:text="${property.price}"></td>
            <td th:text="${property.description}"></td>

            <!-- Show bedrooms only if property type is House -->
            <td>
                <span th:if="${property.propertyType == 'House'}"
                      th:text="'Bedrooms: ' + ${property.bedrooms}">
                </span>

                <span th:if="${property.propertyType == 'Apartment'}"
                      th:text="'Floor: ' + ${property.floorNumber}">
                </span>

                <span th:if="${property.propertyType == 'Land'}"
                      th:text="'Land Size: ' + ${property.landSize}">
                </span>
            </td>

            <td>
                <span th:if="${property.propertyType == 'House'}"
                      th:text="'Bathrooms: ' + ${property.bathrooms}">
                </span>

                <span th:if="${property.propertyType == 'Apartment'}"
                      th:text="'Unit: ' + ${property.unitNumber}">
                </span>

                <span th:if="${property.propertyType == 'Land'}"
                      th:text="'Land Type: ' + ${property.landType}">
                </span>
            </td>

            <!-- Action buttons -->
            <td>
                <!-- View full property details button -->
                <a th:href="@{/properties/details/{id}(id=${property.propertyId})}"
                   class="btn btn-info btn-sm">
                    View
                </a>
                <!-- Edit property button -->
                <a th:href="@{/properties/edit/{id}(id=${property.propertyId})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>
                <!-- Delete property button -->
                <a th:href="@{/properties/delete/{id}(id=${property.propertyId})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this property?')">
                    Delete
                </a>
            </td>

        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
