<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit Property</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container mt-5">

    <!-- Dynamic page title -->
    <h1 class="mb-4">
        Edit <span th:text="${property.propertyType}"></span> Property
    </h1>

    <!-- Edit Form -->
    <form action="/properties/update" method="post">

        <!-- Property ID -->
        <div class="mb-3">
            <label class="form-label">Property ID</label>

            <!-- readonly so user cannot change ID -->
            <input type="text"
                   name="propertyId"
                   class="form-control"
                   th:value="${property.propertyId}"
                   readonly>
        </div>

        <!-- Property Type -->
        <div class="mb-3">
            <label class="form-label">Property Type</label>

            <!-- readonly type -->
            <input type="text"
                   name="propertyType"
                   class="form-control"
                   th:value="${property.propertyType}"
                   readonly>
        </div>

        <!-- Title -->
        <div class="mb-3">
            <label class="form-label">Title</label>

            <input type="text"
                   name="title"
                   class="form-control"
                   th:value="${property.title}"
                   required>
        </div>

        <!-- Location -->
        <div class="mb-3">
            <label class="form-label">Location</label>

            <input type="text"
                   name="location"
                   class="form-control"
                   th:value="${property.location}"
                   required>
        </div>

        <!-- Price -->
        <div class="mb-3">
            <label class="form-label">Price</label>

            <input type="number"
                   step="0.01"
                   min="1"
                   name="price"
                   class="form-control"
                   th:value="${property.price}"
                   required>
        </div>

        <!-- Description -->
        <div class="mb-3">
            <label class="form-label">Description</label>

            <textarea name="description"
                      class="form-control"
                      required
                      th:text="${property.description}">
            </textarea>
        </div>

        <!-- ================= HOUSE ================= -->

        <div th:if="${property.propertyType == 'House'}">

            <div class="mb-3">
                <label class="form-label">Bedrooms</label>

                <input type="number"
                       name="bedrooms"
                       min="0"
                       class="form-control"
                       th:value="${property.bedrooms}">
            </div>

            <div class="mb-3">
                <label class="form-label">Bathrooms</label>

                <input type="number"
                       name="bathrooms"
                       min="0"
                       class="form-control"
                       th:value="${property.bathrooms}">
            </div>

        </div>

        <!-- ================= APARTMENT ================= -->

        <div th:if="${property.propertyType == 'Apartment'}">

            <div class="mb-3">
                <label class="form-label">Floor Number</label>

                <input type="number"
                       name="floorNumber"
                       min="0"
                       class="form-control"
                       th:value="${property.floorNumber}">
            </div>

            <div class="mb-3">
                <label class="form-label">Unit Number</label>

                <input type="text"
                       name="unitNumber"
                       class="form-control"
                       th:value="${property.unitNumber}">
            </div>

        </div>

        <!-- ================= LAND ================= -->

        <div th:if="${property.propertyType == 'Land'}">

            <div class="mb-3">
                <label class="form-label">Land Size</label>

                <input type="number"
                       step="0.01"
                       name="landSize"
                       min="1"
                       class="form-control"
                       th:value="${property.landSize}">
            </div>

            <div class="mb-3">
                <label class="form-label">Land Type</label>

                <input type="text"
                       name="landType"
                       class="form-control"
                       th:value="${property.landType}">
            </div>

        </div>

        <!-- Buttons -->
        <button type="submit" class="btn btn-success">
            Update Property
        </button>

        <a href="/properties" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
