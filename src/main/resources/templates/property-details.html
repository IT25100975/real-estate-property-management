<!DOCTYPE html>

<!-- Thymeleaf page for showing full details of one property -->
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Property Details</title>

    <!-- Bootstrap CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS file -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Property Details</h1>

    <div class="card">
        <div class="card-body">

            <h3 th:text="${property.title}"></h3>

            <p><strong>ID:</strong> <span th:text="${property.propertyId}"></span></p>
            <p><strong>Type:</strong> <span th:text="${property.propertyType}"></span></p>
            <p><strong>Location:</strong> <span th:text="${property.location}"></span></p>
            <p><strong>Price:</strong> Rs. <span th:text="${property.price}"></span></p>
            <p><strong>Description:</strong> <span th:text="${property.description}"></span></p>

            <!-- Show specific details depending on property type -->

            <!-- House Details -->
            <div th:if="${property.propertyType == 'House'}">

                <p>
                    <strong>Bedrooms:</strong>
                    <span th:text="${property.bedrooms}"></span>
                </p>

                <p>
                    <strong>Bathrooms:</strong>
                    <span th:text="${property.bathrooms}"></span>
                </p>

            </div>

            <!-- Apartment Details -->
            <div th:if="${property.propertyType == 'Apartment'}">

                <p>
                    <strong>Floor Number:</strong>
                    <span th:text="${property.floorNumber}"></span>
                </p>

                <p>
                    <strong>Unit Number:</strong>
                    <span th:text="${property.unitNumber}"></span>
                </p>

            </div>

            <!-- Land Details -->
            <div th:if="${property.propertyType == 'Land'}">

                <p>
                    <strong>Land Size:</strong>
                    <span th:text="${property.landSize}"></span>
                </p>

                <p>
                    <strong>Land Type:</strong>
                    <span th:text="${property.landType}"></span>
                </p>

            </div>

            <a href="/properties" class="btn btn-secondary">Back to Listings</a>

        </div>
    </div>

</div>

</body>
</html>
